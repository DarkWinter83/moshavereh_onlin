<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
    <defs>
        <linearGradient id="leftGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0f766e" /> <stop offset="100%" stop-color="#2dd4bf" /> </linearGradient>
        
        <linearGradient id="rightGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1e3a8a" /> <stop offset="100%" stop-color="#60a5fa" /> </linearGradient>

        <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.1" />
        </filter>
    </defs>

    <g filter="url(#subtleShadow)" transform="translate(0, 5)">
        
        <path d="M 100,145 C 75,145 40,115 40,80 C 40,45 70,35 85,55 C 95,68 100,85 100,105 Z" 
              fill="url(#leftGrad)" />
        
        <path d="M 100,145 C 125,145 160,115 160,80 C 160,45 130,35 115,55 C 105,68 100,85 100,105 Z" 
              fill="url(#rightGrad)" />
              
        <circle cx="100" cy="45" r="8" fill="#0f172a" />
        
        <path d="M 100,140 C 97,115 94,85 100,60 C 106,85 103,115 100,140 Z" 
              fill="#0f172a" />
              
    </g>
</svg>
